name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-2022
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Tesseract
      run: |
        # GitHub hosted windows 镜像已预装 Tesseract
        # 只需添加到 PATH
        $tesseractPath = "C:\Program Files\Tesseract-OCR"
        $env:PATH = "$tesseractPath;$env:PATH"
        [Environment]::SetEnvironmentVariable("Path", "$env:PATH", "Machine")
        Write-Host "Tesseract path added"
    
    - name: Verify Tesseract
      run: |
        tesseract --version
        tesseract --list-langs
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytesseract pillow openpyxl pyinstaller
    
    - name: Build EXE (CLI)
      run: |
        pyinstaller --onefile --name invoice-ocr invoice_ocr.py
    
    - name: Build EXE (GUI)
      run: |
        pyinstaller --onefile --windowed --name invoice-ocr-gui invoice_ocr_gui.py
    
    - name: Create Release Package
      run: |
        Compress-Archive -Path dist/*.exe,*.md,requirements.txt -DestinationPath invoice-ocr-windows.zip -Force
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: invoice-ocr-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
