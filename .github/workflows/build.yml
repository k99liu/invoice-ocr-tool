name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymupdf pytesseract pillow openpyxl pyinstaller
    
    - name: Install Tesseract
      run: |
        # 下载并安装 Tesseract
        $installer = "$env:TEMP\tesseract-setup.exe"
        Invoke-WebRequest -Uri "https://github.com/UB-Mannheim/tesseract/releases/download/v5.3.3/tesseract-ocr-w64-setup-5.3.3.exe" -OutFile $installer
        Start-Process -FilePath $installer -ArgumentList "/SILENT", "/SP-", "/NORESTART", "/DIR=C:\Program Files\Tesseract-OCR" -Wait
        $env:PATH = "C:\Program Files\Tesseract-OCR;$env:PATH"
        [Environment]::SetEnvironmentVariable("Path", $env:PATH + ";C:\Program Files\Tesseract-OCR", "Machine")
    
    - name: Verify Tesseract
      run: |
        tesseract --version
    
    - name: Build EXE (CLI)
      run: |
        pyinstaller --onefile --name invoice-ocr invoice_ocr.py
    
    - name: Build EXE (GUI)
      run: |
        pyinstaller --onefile --windowed --name invoice-ocr-gui invoice_ocr_gui.py
    
    - name: Create Release Package
      run: |
        Compress-Archive -Path dist/*.exe,*.md,requirements.txt -DestinationPath invoice-ocr-windows.zip -Force
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: invoice-ocr-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
