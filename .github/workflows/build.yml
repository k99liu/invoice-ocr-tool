name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Tesseract
      run: |
        choco install tesseract --yes
        choco install tesseract-language-chinese-simplified --yes
    
    - name: Build EXE (CLI)
      run: |
        pyinstaller --onefile --name invoice-ocr invoice_ocr.py
    
    - name: Build EXE (GUI)
      run: |
        pyinstaller --onefile --windowed --name invoice-ocr-gui invoice_ocr_gui.py
    
    - name: Create Release Package
      run: |
        Compress-Archive -Path dist/*.exe,*.md,requirements.txt -DestinationPath invoice-ocr-windows.zip -Force
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: invoice-ocr-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
